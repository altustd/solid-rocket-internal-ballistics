project:
  type: book
  output-dir: _book

book:
  title: "Solid Rocket Internal Ballistics"
  subtitle: "Theory ⋅ Equations ⋅ Numerical Simulation"
  author: "Troy Altus"
  date: today
  repo-url: https://github.com/altustd/solid-rocket-internal-ballistics
  repo-actions: [edit, issue]

  chapters:
    - index.qmd
    - chapters/00-preface.qmd
    - chapters/01-intro.qmd
    - chapters/02-propellants.qmd
    - chapters/03-grain-design.qmd
    - chapters/04-burnback-simulation.qmd
    - chapters/05-internal-ballistics.qmd
    - chapters/06-burning-rate-and-kn.qmd
    - chapters/07-erosive-burning.qmd
    - chapters/08-performance-modeling.qmd
    - chapters/09-ignition-transient.qmd
    - chapters/10-full-simulation.qmd

  appendices:
    - appendices/a-derivations.qmd
    - appendices/b-propellant-database.qmd
    - appendices/c-python-modules.qmd
    - appendices/d-numerical-methods.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    number-sections: true
    toc: true
    toc-depth: 3
    smooth-scroll: true

  pdf:
    documentclass: scrreprt
    number-sections: true
    toc: true
    latex-engine: pdflatex

# Force Quarto to use the correct Python kernel (this fixes most render failures)
jupyter: python3

execute:
  echo: false          # Hide all code by default (clean textbook style)
  warning: false
  message: false
  cache: true          # Speeds up repeated renders

crossref:
  chapters: true