project:
  type: book
  output-dir: _book

book:
  title: "Solid Propellant Rocket Motors: Internal Ballistics"
  subtitle: "Theory, Design, and Simulation"
  author: "Troy Altus"
  date: "March 2026"
  chapters:
    - index.qmd
    - part: "Fundamentals"
      chapters:
        - 01-intro.qmd
        - 02-propellants.qmd
        - 03-grain-design.qmd
    - part: "Internal Ballistics Core"
      chapters:
        - 04-internal-ballistics.qmd
        - 05-burning-rate.qmd
        - 06-grain-burnback.qmd
    - part: "Advanced Topics"
      chapters:
        - 07-transients-stability.qmd
        - 08-numerical-modeling.qmd
        - 09-applications-examples.qmd
  appendices:
    - references.qmd   # auto-generated from bibliography

bibliography: references.bib
csl: apa.csl   # or ieee.csl, etc. (download one or omit)

format:
  html:
    theme: cosmo
    css: styles.css
    toc-depth: 3
    number-sections: true
    code-fold: true
  pdf:
    documentclass: scrbook
    papersize: letter
    toc: true
    number-sections: true
    fig-cap-location: bottom
  epub:
    toc: true